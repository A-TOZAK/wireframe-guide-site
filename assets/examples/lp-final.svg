<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="900" viewBox="0 0 1200 900" role="img" aria-labelledby="title desc">
  <title id="title">LP完成例</title>
  <desc id="desc">神教材製作所のランディングページ完成例。</desc>
  <rect width="1200" height="900" fill="#f4f6f3"/>
  <rect x="56" y="42" width="1088" height="74" rx="12" fill="#fffdf8" stroke="#d8d2c4"/>
  <text x="90" y="88" fill="#1c2730" font-family="sans-serif" font-size="24" font-weight="800">神教材製作所</text>
  <text x="760" y="88" fill="#52616d" font-family="sans-serif" font-size="18">教材一覧　実践記録　お問い合わせ</text>
  <rect x="56" y="150" width="1088" height="280" rx="18" fill="#fffdf8" stroke="#d8d2c4"/>
  <text x="96" y="218" fill="#2f6b4f" font-family="sans-serif" font-size="24" font-weight="700">先生の「明日使える」をつくる</text>
  <text x="96" y="284" fill="#1c2730" font-family="sans-serif" font-size="50" font-weight="800">授業準備を、</text>
  <text x="96" y="346" fill="#1c2730" font-family="sans-serif" font-size="50" font-weight="800">構造から軽くする。</text>
  <rect x="96" y="374" width="230" height="52" rx="26" fill="#2f6b4f"/>
  <text x="137" y="408" fill="#fff" font-family="sans-serif" font-size="22" font-weight="700">教材を見てみる</text>
  <g transform="translate(670 188)">
    <rect width="344" height="196" rx="18" fill="#e7f0ec"/>
    <rect x="28" y="28" width="128" height="96" rx="10" fill="#fff"/>
    <rect x="184" y="28" width="128" height="96" rx="10" fill="#fff"/>
    <rect x="28" y="146" width="284" height="18" rx="9" fill="#b8cdbf"/>
  </g>
  <rect x="56" y="468" width="1088" height="148" rx="18" fill="#fffdf8" stroke="#d8d2c4"/>
  <text x="96" y="530" fill="#1c2730" font-family="sans-serif" font-size="34" font-weight="800">こんな悩みに効きます</text>
  <text x="96" y="574" fill="#52616d" font-family="sans-serif" font-size="23">教材の質は上げたい。でも、毎日の準備時間は増やせない。</text>
  <rect x="56" y="654" width="1088" height="188" rx="18" fill="#fffdf8" stroke="#d8d2c4"/>
  <g font-family="sans-serif">
    <g transform="translate(96 700)"><rect width="292" height="96" rx="14" fill="#e7f0ec"/><text x="24" y="42" fill="#1c2730" font-size="24" font-weight="800">問いから設計</text><text x="24" y="72" fill="#52616d" font-size="18">思考の流れを先に作る</text></g>
    <g transform="translate(454 700)"><rect width="292" height="96" rx="14" fill="#edf2f6"/><text x="24" y="42" fill="#1c2730" font-size="24" font-weight="800">資料を読みやすく</text><text x="24" y="72" fill="#52616d" font-size="18">見る順番まで整える</text></g>
    <g transform="translate(812 700)"><rect width="292" height="96" rx="14" fill="#f4eadf"/><text x="24" y="42" fill="#1c2730" font-size="24" font-weight="800">すぐ使える型</text><text x="24" y="72" fill="#52616d" font-size="18">シリーズ化しやすい</text></g>
  </g>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720" role="img" aria-labelledby="title desc">
  <title id="title">スライド完成例</title>
  <desc id="desc">ワイヤーフレームが授業設計に効くことを説明する完成スライド。</desc>
  <rect width="1280" height="720" fill="#f9f7f1"/>
  <rect x="54" y="48" width="1172" height="624" rx="16" fill="#fffdf8" stroke="#ded8c7" stroke-width="2"/>
  <text x="104" y="132" fill="#1c2730" font-family="sans-serif" font-size="52" font-weight="800">ワイヤーフレームは、授業設計にも効く</text>
  <text x="106" y="184" fill="#66717b" font-family="sans-serif" font-size="27">「何を見て、何を考え、どこに書くか」を先に決める</text>
  <g transform="translate(112 252)">
    <rect width="286" height="236" rx="18" fill="#e7f0ec"/>
    <circle cx="54" cy="56" r="26" fill="#2f6b4f"/>
    <text x="45" y="66" fill="#fff" font-family="sans-serif" font-size="28" font-weight="800">1</text>
    <text x="36" y="120" fill="#1c2730" font-family="sans-serif" font-size="34" font-weight="800">問い</text>
    <text x="36" y="165" fill="#52616d" font-family="sans-serif" font-size="23">今日、何を考えるか</text>
    <path d="M36 188h210" stroke="#9db3a7" stroke-width="5" stroke-linecap="round"/>
  </g>
  <g transform="translate(497 252)">
    <rect width="286" height="236" rx="18" fill="#edf2f6"/>
    <circle cx="54" cy="56" r="26" fill="#1d5f8f"/>
    <text x="45" y="66" fill="#fff" font-family="sans-serif" font-size="28" font-weight="800">2</text>
    <text x="36" y="120" fill="#1c2730" font-family="sans-serif" font-size="34" font-weight="800">資料</text>
    <text x="36" y="165" fill="#52616d" font-family="sans-serif" font-size="23">見る順番を支える</text>
    <path d="M36 188h210" stroke="#a8bac8" stroke-width="5" stroke-linecap="round"/>
  </g>
  <g transform="translate(882 252)">
    <rect width="286" height="236" rx="18" fill="#f4eadf"/>
    <circle cx="54" cy="56" r="26" fill="#a85e24"/>
    <text x="45" y="66" fill="#fff" font-family="sans-serif" font-size="28" font-weight="800">3</text>
    <text x="36" y="120" fill="#1c2730" font-family="sans-serif" font-size="34" font-weight="800">作業</text>
    <text x="36" y="165" fill="#52616d" font-family="sans-serif" font-size="23">考えを書ける余白</text>
    <path d="M36 188h210" stroke="#d2aa87" stroke-width="5" stroke-linecap="round"/>
  </g>
  <text x="112" y="588" fill="#1c2730" font-family="sans-serif" font-size="30" font-weight="700">良いスライドは、説明を増やすのではなく、視線の迷いを減らす。</text>
</svg>
